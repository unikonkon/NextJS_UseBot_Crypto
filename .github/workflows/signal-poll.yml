name: Crypto Signal Poll

# ─── จับสัญญาณซื้อขายแล้วยิง Discord ───────────────────────────────
# ยิง endpoint /api/cron/scan บน Vercel ตามรอบเวลา (Approach A: ไม่ใช้ DB)
# ตั้งให้ยิง "ตรงรอบปิดแท่ง" ของ timeframe ที่ใช้ใน SCAN_INTERVAL
#
# ก่อนใช้งาน ตั้ง 2 ค่าใน GitHub repo → Settings → Secrets and variables → Actions:
#   - Secret  VERCEL_APP_URL   เช่น https://your-app.vercel.app   (ไม่ต้องมี / ปิดท้าย)
#   - Secret  CRON_SECRET      ต้องตรงกับ env CRON_SECRET บน Vercel
#
# หมายเหตุ: GitHub Actions cron ยิงขั้นต่ำ ~ทุก 5 นาที และ "อาจดีเลย์ 3–10 นาที"
# ในชั่วโมงที่คนใช้เยอะ จึงตั้ง SIGNAL_FRESHNESS_MIN บน Vercel ให้กว้างพอ (เช่น 15)

on:
  schedule:
    # ตัวอย่างสำหรับ timeframe 1h → ยิงต้นชั่วโมง (นาทีที่ 1 เผื่อแท่งปิดสนิท)
    - cron: "1 * * * *"
    # ── timeframe อื่น ปลดคอมเมนต์ที่ตรงกับ SCAN_INTERVAL ──
    # 15m: - cron: "*/15 * * * *"
    # 5m:  - cron: "*/5 * * * *"
    # 4h:  - cron: "1 */4 * * *"
    # 1d:  - cron: "5 0 * * *"
  workflow_dispatch: {} # กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scan endpoint
        run: |
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/scan")
          echo "HTTP $code"
          cat /tmp/out.json
          test "$code" = "200"
